<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="field" cx="50%" cy="44%" r="72%">
      <stop offset="0%" stop-color="#07141d"/>
      <stop offset="55%" stop-color="#030810"/>
      <stop offset="100%" stop-color="#010307"/>
    </radialGradient>
    <radialGradient id="vignette" cx="50%" cy="50%" r="60%">
      <stop offset="60%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.55"/>
    </radialGradient>
    <radialGradient id="node" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#f4cf6a"/>
      <stop offset="100%" stop-color="#d8a93a"/>
    </radialGradient>
    <radialGradient id="iris" cx="50%" cy="42%" r="60%">
      <stop offset="0%" stop-color="#5cf2da"/>
      <stop offset="45%" stop-color="#2bbfa8"/>
      <stop offset="100%" stop-color="#0e4a43"/>
    </radialGradient>
    <linearGradient id="stroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5cf2da"/>
      <stop offset="100%" stop-color="#2bbfa8"/>
    </linearGradient>
    <filter id="bloom" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
    <filter id="grain"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/></filter>
  </defs>

